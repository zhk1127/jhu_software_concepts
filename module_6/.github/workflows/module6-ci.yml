name: Module 6 CI

on:
  push:
    paths:
      - "module_6/**"
      - ".github/workflows/module6-ci.yml"

  pull_request:
    paths:
      - "module_6/**"
      - ".github/workflows/module6-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gradcafe
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d gradcafe"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_NAME: gradcafe
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      RABBITMQ_URL: amqp://guest:guest@localhost:5672/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd module_6
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Initialize database
        run: |
          cd module_6
          python -m src.db.load_data

      - name: Run pytest
        run: |
          cd module_6
          python -m pytest

      - name: Run pylint
        run: |
          cd module_6
          pylint src consumer.py publisher.py --fail-under=10